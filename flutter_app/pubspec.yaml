name: bengali_app_guide
description: A live interactive guide app using Gemini AI.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.0
  flutter_tts: ^4.0.2
  flutter_overlay_window: ^0.4.1
  screen_capturer: ^0.2.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
